<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#143a7e"/>
      <stop offset="1" stop-color="#0a1f45"/>
    </linearGradient>
    <linearGradient id="ringGrad" x1="22" y1="14" x2="78" y2="86" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5AA6FF"/>
      <stop offset="1" stop-color="#1B54D8"/>
    </linearGradient>
    <linearGradient id="waveGrad" x1="30" y1="50" x2="66" y2="82" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8FC0FF"/>
      <stop offset="1" stop-color="#2E71E5"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- 은은한 물결 -->
  <path d="M0 560 C 200 520, 380 600, 620 545 C 860 490, 1000 585, 1200 535 L 1200 630 L 0 630 Z" fill="rgba(90,150,255,0.10)"/>
  <path d="M0 600 C 240 560, 420 630, 660 585 C 900 540, 1040 615, 1200 575 L 1200 630 L 0 630 Z" fill="rgba(90,150,255,0.08)"/>

  <!-- 텍스트 -->
  <text x="84" y="330" font-family="'Apple SD Gothic Neo', 'Helvetica Neue', Arial, sans-serif" font-size="120" font-weight="800" fill="#ffffff" letter-spacing="2">OCEAN</text>
  <text x="88" y="392" font-family="'Apple SD Gothic Neo', sans-serif" font-size="36" font-weight="600" fill="#c9d7f0">나를 발견하는 심리 검사 플랫폼</text>
  <rect x="88" y="420" width="66" height="6" rx="3" fill="#3b82f6"/>
  <text x="88" y="486" font-family="'Apple SD Gothic Neo', sans-serif" font-size="27" font-weight="500" fill="#9fb2d6">5가지 핵심 검사로 나의 강점과 성향을</text>
  <text x="88" y="524" font-family="'Apple SD Gothic Neo', sans-serif" font-size="27" font-weight="500" fill="#9fb2d6">명확하게 파악해보세요.</text>

  <!-- 로고 마크 -->
  <g transform="translate(770,120) scale(4.0)">
    <circle cx="50" cy="50" r="34.5" fill="none" stroke="url(#ringGrad)" stroke-width="13" stroke-linecap="round"/>
    <path d="M16.5 54 C 27 44.5, 39 45.5, 50 53 C 61 60.5, 72.5 61.5, 83.5 51.5 C 81 72, 67.5 83, 50 83 C 32.5 83, 19.5 72.5, 16.5 54 Z" fill="url(#waveGrad)"/>
  </g>
</svg>
